<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Twisty Scrambler + Solver</title>
  <style>
    :root { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    body { margin: 0; background: #0f1220; color: #e9ecff; }
    .wrap { max-width: 980px; margin: 1.5rem auto; padding: 1rem; }
    .card { background: #171b2f; border: 1px solid #2c335a; border-radius: 16px; padding: 1rem; }
    .layout { display: grid; grid-template-columns: 1fr 360px; gap: 1rem; }
    @media (max-width: 900px){ .layout{ grid-template-columns: 1fr; } }
    h1 { margin-top: 0; font-size: 1.6rem; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    .actions { display: flex; flex-wrap: wrap; gap: .6rem; margin: 1rem 0; }
    button, select, input { border: 1px solid #3d4780; background: #22294a; color: #f2f4ff; border-radius: 10px; padding: .55rem .75rem; }
    button { cursor: pointer; font-weight: 600; }
    .output,.note { min-height: 3.2rem; line-height: 1.6; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; background: #0f1325; border: 1px solid #2a3055; border-radius: 10px; padding: .75rem; white-space: pre-wrap; word-break: break-word; }
    .small { opacity: .85; font-size: .9rem; }
    .pill { display: inline-block; font-size: .8rem; padding: .1rem .45rem; border: 1px solid #425099; border-radius: 999px; margin-left: .4rem; }
    .cube-wrap { background: #0f1325; border: 1px solid #2a3055; border-radius: 10px; padding: .5rem; }
    canvas { width: 100%; height: auto; display: block; }
    .error { color: #ffb4b4; margin-top: .3rem; font-size: .88rem; min-height: 1.1rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Twisty Scrambler + Solver <span class="pill" id="status">idle</span></h1>
      <div class="layout">
        <div>
          <p class="small">Supports scrambles: 2x2, 3x3, 4x4, 5x5, 6x6, 7x7, Pyraminx, Megaminx.</p>
          <div class="row">
            <label>Puzzle<select id="puzzle"><option>2x2</option><option selected>3x3</option><option>4x4</option><option>5x5</option><option>6x6</option><option>7x7</option><option>Pyraminx</option><option>Megaminx</option></select></label>
            <label>Move delay (ms)<input id="delay" type="number" min="1" max="5000" value="180" /></label>
          </div>
          <div class="error" id="delayError"></div>

          <div class="actions"><button id="scrambleBtn">Scramble</button><button id="solveBtn">Solve</button><button id="autoBtn">Start AutoSolve</button><button id="stopBtn">Stop</button></div>
          <h3>Scramble</h3><div id="scrambleOut" class="output">(none yet)</div>
          <h3>Solution</h3><div id="solutionOut" class="output">(none yet)</div>
        </div>
        <div>
          <h3>Cube View</h3>
          <div class="cube-wrap"><canvas id="cubeCanvas" width="340" height="260"></canvas></div>
          <div class="note" id="viewNote">Displays the current cube state for 2x2–7x7.</div>
        </div>
      </div>
    </div>
  </div>
<script>
const defs = {
  "2x2": { len: 11, n:2, moves: ["R","L","U","D","F","B"], suffix: ["", "'", "2"] },
  "3x3": { len: 20, n:3, moves: ["R","L","U","D","F","B"], suffix: ["", "'", "2"] },
  "4x4": { len: 40, n:4, moves: ["R","L","U","D","F","B"], suffix: ["", "'", "2"] },
  "5x5": { len: 60, n:5, moves: ["R","L","U","D","F","B"], suffix: ["", "'", "2"] },
  "6x6": { len: 80, n:6, moves: ["R","L","U","D","F","B"], suffix: ["", "'", "2"] },
  "7x7": { len: 100, n:7, moves: ["R","L","U","D","F","B"], suffix: ["", "'", "2"] },
  "Pyraminx": { len: 12, moves: ["R","L","U","B","r","l","u","b"], suffix: ["", "'"] },
  "Megaminx": { len: 70, moves: ["R++","R--","D++","D--","U","U'"], suffix: [""] },
};
const el = id => document.getElementById(id);
const puzzle=el('puzzle'), scrambleOut=el('scrambleOut'), solutionOut=el('solutionOut'), status=el('status'), delayInput=el('delay'), delayError=el('delayError'), viewNote=el('viewNote');
const canvas=el('cubeCanvas'), ctx=canvas.getContext('2d');
let lastScramble=[], autoOn=false, runningSolve=false, cube=null;
const colors={U:'#ffffff',D:'#ffd500',F:'#00b950',B:'#1b6eff',L:'#ff7f00',R:'#d91e2b'};

function makeCube(n){ const c={n}; for (const f of ['U','R','F','D','L','B']) c[f]=Array.from({length:n},()=>Array(n).fill(f)); return c; }
function rotFace(face){ const n=face.length, out=Array.from({length:n},()=>Array(n)); for(let r=0;r<n;r++)for(let c=0;c<n;c++) out[c][n-1-r]=face[r][c]; return out; }
function getCol(face,i){return face.map(r=>r[i]);} function setCol(face,i,col){for(let r=0;r<face.length;r++) face[r][i]=col[r];}
function moveOnce(m){ const n=cube.n; const U=cube.U,D=cube.D,F=cube.F,B=cube.B,L=cube.L,R=cube.R;
  if(m==='U'){cube.U=rotFace(U); const t=F[0].slice(); F[0]=R[0].slice(); R[0]=B[0].slice(); B[0]=L[0].slice(); L[0]=t;}
  if(m==='D'){cube.D=rotFace(D); const t=F[n-1].slice(); F[n-1]=L[n-1].slice(); L[n-1]=B[n-1].slice(); B[n-1]=R[n-1].slice(); R[n-1]=t;}
  if(m==='R'){cube.R=rotFace(R); const t=getCol(U,n-1); setCol(U,n-1,getCol(F,n-1)); setCol(F,n-1,getCol(D,n-1)); setCol(D,n-1,getCol(B,0).reverse()); setCol(B,0,t.reverse());}
  if(m==='L'){cube.L=rotFace(L); const t=getCol(U,0); setCol(U,0,getCol(B,n-1).reverse()); setCol(B,n-1,getCol(D,0).reverse()); setCol(D,0,getCol(F,0)); setCol(F,0,t);}
  if(m==='F'){cube.F=rotFace(F); const t=U[n-1].slice(); U[n-1]=getCol(L,n-1).reverse(); setCol(L,n-1,D[0].slice()); D[0]=getCol(R,0).reverse(); setCol(R,0,t);}
  if(m==='B'){cube.B=rotFace(B); const t=U[0].slice(); U[0]=getCol(R,n-1).slice(); setCol(R,n-1,D[n-1].slice().reverse()); D[n-1]=getCol(L,0).slice(); setCol(L,0,t.reverse());}
}
function applyMove(m){ let b=m[0], t=m.endsWith('2')?2:m.endsWith("'")?3:1; while(t--) moveOnce(b); }
function renderCube(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(!cube){ ctx.fillStyle='#a5afd9'; ctx.fillText('No cube visualization for this puzzle.', 20, 40); return; }
  const n=cube.n, s=Math.floor(Math.min(26, 240/(n*1.2))), gap=2, block=n*(s+gap)-gap;
  const ox=10, oy=10;
  const faces=[['U',ox+block+20,oy],['L',ox,oy+block+20],['F',ox+block+20,oy+block+20],['R',ox+2*(block+20),oy+block+20],['B',ox+3*(block+20),oy+block+20],['D',ox+block+20,oy+2*(block+20)]];
  for (const [name,x,y] of faces){ const face=cube[name]; for(let r=0;r<n;r++)for(let c=0;c<n;c++){ ctx.fillStyle=colors[face[r][c]]; ctx.fillRect(x+c*(s+gap),y+r*(s+gap),s,s);} ctx.strokeStyle='#000'; ctx.strokeRect(x-1,y-1,block+2,block+2); }
}
function axisOf(move){ if (/[RLr]/.test(move[0])) return 'x'; if (/[UDu]/.test(move[0])) return 'y'; return 'z'; }
const rand = n=>Math.floor(Math.random()*n);
function generateScramble(type){ const {len,moves,suffix}=defs[type]; const out=[]; let a=null; for(let i=0;i<len;i++){ let b,x; do{b=moves[rand(moves.length)];x=axisOf(b);}while(x===a); a=x; out.push(b+suffix[rand(suffix.length)]);} return out; }
function inverseMove(m){ if (m.endsWith('2')) return m; if (m.endsWith('++')) return m.replace('++','--'); if (m.endsWith('--')) return m.replace('--','++'); if (m.endsWith("'")) return m.slice(0,-1); return m+"'"; }
function setStatus(t){ status.textContent=t; }
function getDelay(){ const v=Number(delayInput.value); if(!Number.isFinite(v)||v<=0){ delayError.textContent='Move delay must be greater than 0 ms.'; return null; } delayError.textContent=''; return v; }
function setupView(){ const d=defs[puzzle.value]; if(d.n){ cube=makeCube(d.n); viewNote.textContent='Displays the current cube state for 2x2–7x7.'; } else { cube=null; viewNote.textContent='Visualization is currently available for cube events only (2x2–7x7).'; } renderCube(); }
function doScramble(){ const type=puzzle.value; setupView(); lastScramble=generateScramble(type); scrambleOut.textContent=lastScramble.join(' '); solutionOut.textContent='(press Solve)'; if(cube) lastScramble.forEach(applyMove); renderCube(); setStatus('scrambled'); }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
async function doSolve(){ if(runningSolve) return; const ms=getDelay(); if(ms===null) return; if(!lastScramble.length) doScramble(); runningSolve=true; setStatus('solving...'); const solution=[...lastScramble].reverse().map(inverseMove); let shown=[]; for(const mv of solution){ shown.push(mv); solutionOut.textContent=shown.join(' '); if(cube){ applyMove(mv); renderCube(); } await sleep(ms); } setStatus('solved'); runningSolve=false; }
async function autoLoop(){ const ms=getDelay(); if(ms===null) return; autoOn=true; setStatus('autosolve on'); while(autoOn){ doScramble(); await sleep(280); await doSolve(); await sleep(350); } setStatus('idle'); }
el('scrambleBtn').onclick=doScramble; el('solveBtn').onclick=doSolve; el('autoBtn').onclick=()=>{if(!autoOn) autoLoop();}; el('stopBtn').onclick=()=>{autoOn=false;}; puzzle.onchange=setupView; setupView();
</script>
</body>
</html>
